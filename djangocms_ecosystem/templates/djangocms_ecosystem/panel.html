{% load i18n %}
<div class="col mb-4 ecosystem-package">
    <div class="card h-100 bg-primary bg-opacity-50 ">
        <div class="card-body text-inline-start">
            <h3 class="text-secondary mb-4">{{ title }}</h3>
            <p class="ecosystem-text mb-3">{{ description }}</p>
            <p class="ecosystem-links mt-auto"><a href="{{ repo_url }}" class="streched-link btn btn-outline-primary" target="_blank">{% trans "Go to Repository" %}</a></p>
        </div>
    </div>
</div>
