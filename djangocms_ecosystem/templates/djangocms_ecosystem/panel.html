{% load i18n %}
<div class="col mb-4 ecosystem-package">
    <div class="card h-100 bg-light bg-opacity-50 ">
        <div class="card-body text-start d-flex flex-column">
            <h3 class="text-black mb-4">{{ title }}</h3>
            <p class="ecosystem-text mb-3">{{ description }}</p>
            <a href="{{ repo_url }}" class="ecosystem-links btn btn-outline-secondary mt-auto align-self-start" target="_blank">{% trans "Go to Repository" %}</a>
        </div>
    </div>
</div>
